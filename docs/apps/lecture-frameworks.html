const lessonOrder=['intro','gravity','magnetic','seismic','electrical','em','mt','gpr','borehole'];
const times=['3 min','10 min','4 min','14 min','8 min','6 min','5 min'];
let chapter='intro';let slideIndex=0;let seconds=3000;let timerId=null;
const slide=document.getElementById('slide');const select=document.getElementById('chapter-select');

function escapeHTML(value){return String(value).replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));}
function slideTop(kicker,index){return `<div class="slide-top"><div class="kicker">${escapeHTML(kicker)}</div><span class="level-chip">Undergraduate Core</span><span class="time-chip">${times[index]}</span></div>`;}
function sourceFooter(){return '<div class="source-note">Original course graphics and wording · scientific sources linked from the course References page</div>';}
function renderSlide(){
  const lesson=lessons[chapter];let html='';
  if(slideIndex===0){
    html=`${slideTop('Field decision & goals',0)}<div class="hero"><h1>${escapeHTML(lesson.title)}</h1><div class="field-question">${escapeHTML(lesson.decision)}</div><div class="goal-row">${lesson.goals.map((goal,i)=>`<div class="goal">${i+1}. ${escapeHTML(goal)}</div>`).join('')}</div></div>${sourceFooter()}`;
  }else if(slideIndex===1){
    html=`${slideTop('Essential physics — teacher mini-lesson',1)}<h2>Only what students need before the app</h2><div class="card-grid">${lesson.core.map(item=>`<div class="card"><h3>${escapeHTML(item.title)}</h3><p>${escapeHTML(item.text)}</p></div>`).join('')}</div><div class="signal-path">${lesson.path.map((item,i)=>`${i?'<span class="arrow">→</span>':''}<div class="signal-step"><b>${escapeHTML(item)}</b><span>${['Question','Physics','Observable','Evidence-limited conclusion'][i]}</span></div>`).join('')}</div>${sourceFooter()}`;
  }else if(slideIndex===2){
    html=`${slideTop('Predict before clicking',2)}<h2>Commit to an answer first</h2><div class="prediction">${escapeHTML(lesson.prediction)}</div><div class="write-row"><div class="write-box"><h3>Prediction</h3>Write the expected method, signal, trend, or threshold.</div><div class="write-box"><h3>Reason</h3>Name the physical contrast or survey geometry behind it.</div></div>${sourceFooter()}`;
  }else if(slideIndex===3){
    html=`${slideTop('Play the demo or activity',3)}<h2>Change parameters. Record evidence.</h2><div class="launch-row">${lesson.apps.map(app=>`<a class="launch${app.secondary?' secondary':''}" href="${app.url}" target="_blank" rel="noopener">${escapeHTML(app.label)} ↗</a>`).join('')}</div><table class="task-table"><thead><tr><th>Test</th><th>Change in the app</th><th class="evidence">Evidence to record</th></tr></thead><tbody>${lesson.tasks.map(row=>`<tr>${row.map(cell=>`<td>${escapeHTML(cell)}</td>`).join('')}</tr>`).join('')}</tbody></table><div class="prompt"><strong>Instructor role:</strong> circulate and ask “What changed on the graph or readout?” before explaining.</div>${sourceFooter()}`;
  }else if(slideIndex===4){
    html=`${slideTop('Guided exploration',4)}<h2>Answer with evidence from the app</h2><div class="question-grid">${lesson.questions.map((question,i)=>`<div class="question-card"><b>Q${i+1}</b><p>${escapeHTML(question)}</p></div>`).join('')}</div><div class="prompt"><strong>Graduate Extension:</strong> ${escapeHTML(lesson.graduate)}</div>${sourceFooter()}`;
  }else if(slideIndex===5){
    html=`${slideTop('Formative practice',5)}<h2>Apply the observation before the debrief</h2><div class="practice-grid"><div class="practice-card"><h3>Individual → pair</h3><ol><li>Open the linked practice set.</li><li>Complete the chapter questions using your demo notes.</li><li>Compare one changed answer with a partner.</li></ol><div class="launch-row"><a class="launch" href="${lesson.practice}" target="_blank" rel="noopener">Open Practice Lab ↗</a></div></div><div class="practice-card"><h3>Apply it to a field workflow</h3><p>Use the observation to make a method, processing, or safety decision.</p><a class="launch secondary" href="${lesson.activity}" target="_blank" rel="noopener">${escapeHTML(lesson.activityLabel)} ↗</a></div></div>${sourceFooter()}`;
  }else{
    html=`${slideTop('Discussion & exit ticket',6)}<h2>What can we defend after the exploration?</h2><div class="discussion-grid"><div class="card"><h3>Discuss</h3><ol>${lesson.discuss.map(item=>`<li>${escapeHTML(item)}</li>`).join('')}</ol></div><div class="exit"><h3>Exit ticket</h3><p>${escapeHTML(lesson.exit)}</p><a class="launch secondary" href="${lesson.next}">${escapeHTML(lesson.nextLabel)} →</a></div></div>${sourceFooter()}`;
  }
  slide.innerHTML=html;
  const progress=100*(slideIndex+1)/7;document.getElementById('progress').style.width=`${progress}%`;document.querySelector('.progress').setAttribute('aria-valuenow',String(slideIndex+1));document.getElementById('counter').textContent=`${slideIndex+1} / 7`;document.getElementById('previous').disabled=slideIndex===0;document.getElementById('next').disabled=slideIndex===6;
  document.title=`${lesson.nav} Active-Learning Lesson | Environmental Geophysics`;
  history.replaceState(null,'',`#${chapter}/${slideIndex+1}`);
}
function parseHash(){const [requested,number]=location.hash.slice(1).split('/');chapter=lessonOrder.includes(requested)?requested:'intro';const parsed=Number(number);slideIndex=Number.isInteger(parsed)&&parsed>=1&&parsed<=7?parsed-1:0;select.value=chapter;renderSlide();}
function changeSlide(delta){slideIndex=Math.max(0,Math.min(6,slideIndex+delta));renderSlide();}
function lessonURL(){return `${location.origin}${location.pathname}#${chapter}/1`;}
async function copyLessonLink(button){try{await navigator.clipboard.writeText(lessonURL());const old=button.textContent;button.textContent='Copied';setTimeout(()=>button.textContent=old,1200);}catch{window.prompt('Copy this lesson link:',lessonURL());}}
function updateTimer(){const mins=Math.floor(seconds/60);const secs=seconds%60;document.getElementById('timer').textContent=`${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;}
function toggleTimer(){if(timerId){clearInterval(timerId);timerId=null;return;}timerId=setInterval(()=>{if(seconds>0){seconds-=1;updateTimer();}else{clearInterval(timerId);timerId=null;}},1000);}
lessonOrder.forEach(key=>{const option=document.createElement('option');option.value=key;option.textContent=lessons[key].nav;select.appendChild(option);});
select.addEventListener('change',()=>{chapter=select.value;slideIndex=0;seconds=3000;updateTimer();renderSlide();});document.getElementById('previous').addEventListener('click',()=>changeSlide(-1));document.getElementById('next').addEventListener('click',()=>changeSlide(1));document.getElementById('fullscreen').addEventListener('click',()=>document.fullscreenElement?document.exitFullscreen():document.getElementById('presentation').requestFullscreen());document.getElementById('copy-link').addEventListener('click',event=>copyLessonLink(event.currentTarget));document.getElementById('copy-student-link').addEventListener('click',event=>copyLessonLink(event.currentTarget));document.getElementById('timer').addEventListener('click',toggleTimer);window.addEventListener('hashchange',parseHash);
document.addEventListener('keydown',event=>{if(['SELECT','A','BUTTON'].includes(document.activeElement.tagName))return;if(event.key==='ArrowLeft')changeSlide(-1);if(event.key==='ArrowRight'||event.key===' '){event.preventDefault();changeSlide(1);}if(event.key.toLowerCase()==='f')document.getElementById('fullscreen').click();});
parseHash();updateTimer();
</script>
